<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple Music Downloader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        #selection-list { max-height: 450px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #444; }
        .list-row { display: flex; align-items: center; width: 100%; }
        .list-info { flex-grow: 1; padding: 0 10px; }
        .list-date { font-size: 0.85em; color: #888; min-width: 80px; text-align: right; }
        .form-check-label { cursor: pointer; width: 100%; padding: 6px 0; }
        .form-check:hover { background-color: #2a2a2a; border-radius: 4px; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
        .modal-overlay { z-index: 9999 !important; }
        
        .badge-single { background-color: #0dcaf0; color: #000; }
        .badge-ep { background-color: #20c997; color: #000; }
        .badge-album { background-color: #6f42c1; color: #fff; }
        .badge-tag { background-color: #ffc107; color: #000; font-size: 0.75em; margin-left: 5px; }
    </style>
</head>
<body class="bg-dark text-light">

<div class="container-fluid p-3" style="max-width: 1400px;">
    <div class="d-flex justify-content-between mb-4 border-bottom border-secondary pb-3">
        <h3 class="text-primary m-0">🎵 Apple Music Downloader</h3>
        <div class="d-flex gap-3 align-items-center">
            <span id="wrapper-indicator" class="badge bg-danger">Wrapper: Stopped</span>
            <button class="btn btn-sm btn-outline-light" onclick="location.href='/settings'">⚙ Settings</button>
        </div>
    </div>

    <div class="row mb-3 text-center">
        <div class="col-12">
            <button id="login-btn" class="btn btn-sm btn-secondary">Login</button>
            <button id="stop-wrapper-btn" class="btn btn-sm btn-danger d-none">Stop</button>
            <div id="login-form" class="d-none bg-secondary p-3 mt-2 rounded mx-auto" style="max-width:400px">
                <input id="email" class="form-control mb-2" placeholder="Email">
                <input id="password" type="password" class="form-control mb-2" placeholder="Password">
                <button id="submit-login" class="btn btn-success w-100">Connect</button>
            </div>
        </div>
    </div>

    <div id="preview-area" class="row justify-content-center mb-4 d-none">
        <div class="col-md-6">
            <div class="card bg-dark border-info">
                <div class="card-body d-flex align-items-center gap-3">
                    <img id="preview-img" src="" class="preview-img d-none">
                    <div>
                        <h5 id="preview-title" class="mb-1 text-info">Title</h5>
                        <span id="preview-type" class="badge bg-secondary">Type</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center mb-5">
        <div class="col-md-8 text-center">
            <div class="input-group input-group-lg mb-3">
                <input id="link-box" class="form-control bg-dark text-light border-secondary" placeholder="Paste Link">
                <button id="analyze-btn" class="btn btn-info">🔍 Analyze</button>
                <button id="download-btn" class="btn btn-primary px-4" disabled>Download</button>
                <button id="cancel-dl-btn" class="btn btn-danger px-3 d-none" title="Abort Download">🛑</button>
            </div>
            <div class="d-flex justify-content-center gap-4 align-items-center">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="special-audio" checked>
                    <label class="form-check-label" for="special-audio">Special Audio</label>
                </div>
                <div class="btn-group" role="group">
                    <input type="radio" class="btn-check" name="format" id="atmos" value="ATMOS" checked>
                    <label class="btn btn-outline-secondary btn-sm" for="atmos">ATMOS</label>
                    <input type="radio" class="btn-check" name="format" id="aac" value="AAC">
                    <label class="btn btn-outline-secondary btn-sm" for="aac">AAC</label>
                </div>
            </div>
        </div>
    </div>

    <div id="twofa-modal" class="modal-overlay d-none">
        <div class="modal-content text-center">
            <h4>🔐 2FA Code</h4>
            <input id="twofa-code" class="form-control text-center fs-3 mb-3" maxlength="6">
            <button id="submit-2fa" class="btn btn-success w-100">Submit</button>
        </div>
    </div>

    <div id="selection-area" class="card bg-dark border-warning mb-4 d-none">
        <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Select Items</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-dark fw-bold" onclick="skipSelection()">⏭ Skip / Finish</button>
                <span class="badge bg-black text-warning">Action Required</span>
            </div>
        </div>
        <div class="card-body">
            <div id="selection-container">
                <div class="d-flex justify-content-between mb-2">
                    <small>Select items to download:</small>
                    <button class="btn btn-sm btn-outline-light" onclick="toggleSelectAll()">Select All</button>
                </div>
                <div id="selection-list"></div>
            </div>
            <div id="manual-input-container" class="d-none">
                <div class="alert alert-dark text-warning">⚠️ Check logs and enter manually.</div>
                <input id="selection-input" class="form-control bg-dark text-light text-center">
            </div>
            <div class="d-flex justify-content-end mt-3 border-top border-secondary pt-3">
                <button id="submit-selection" class="btn btn-warning px-5 fw-bold text-dark">Confirm & Download</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card bg-dark border-secondary h-100">
                <div class="card-header border-secondary py-1"><small class="text-muted">Downloader Output</small></div>
                <div class="log-box" id="downloader-logs" style="height:400px"></div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card bg-dark border-secondary h-100">
                <div class="card-header border-secondary py-1"><small class="text-muted">Wrapper Output</small></div>
                <div class="log-box" id="wrapper-logs" style="height:400px"></div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
