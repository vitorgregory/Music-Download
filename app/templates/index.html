<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zima Music</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom border-secondary mb-4" style="background: rgba(30,30,30,0.9); backdrop-filter: blur(10px);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fab fa-apple me-2"></i>Zima<span style="color:var(--accent)">Music</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <div id="wrapper-status-dot" class="status-dot" title="Status"></div>
                
                <button id="nav-login-btn" class="btn btn-sm btn-danger d-none fw-bold animate-pulse">
                    <i class="fas fa-plug me-2"></i>Conectar
                </button>
                
                <button class="btn btn-sm btn-outline-secondary rounded-circle" onclick="toggleLogs()"><i class="fas fa-terminal"></i></button>
                <a href="/settings" class="btn btn-sm btn-outline-secondary rounded-circle"><i class="fas fa-cog"></i></a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="hero-search mx-auto text-center" style="max-width: 800px;">
            <h3 class="fw-light text-white mb-4">Biblioteca Global</h3>
            
            <div class="position-relative mb-4">
                <input id="link-box" class="form-control search-input" placeholder="Cole o link do Apple Music...">
                <button id="analyze-btn" class="btn position-absolute end-0 top-0 mt-2 me-3 text-secondary border-0 bg-transparent">
                    <i class="fas fa-search fa-lg"></i>
                </button>
            </div>

            <div class="d-flex gap-3 justify-content-center mb-4 flex-wrap">
                <label class="quality-opt">
                    <input type="radio" name="dl_quality" value="aac">
                    <div class="opt-box">
                        <span class="d-block fw-bold">AAC</span>
                        <small class="text-muted">256kbps</small>
                    </div>
                </label>
                <label class="quality-opt">
                    <input type="radio" name="dl_quality" value="alac" checked>
                    <div class="opt-box">
                        <span class="d-block fw-bold">ALAC</span>
                        <small class="text-muted">Lossless</small>
                    </div>
                </label>
                <label class="quality-opt">
                    <input type="radio" name="dl_quality" value="atmos">
                    <div class="opt-box">
                        <span class="d-block fw-bold">Atmos</span>
                        <small class="text-muted">Spatial</small>
                    </div>
                </label>
            </div>

            <div id="preview-area" class="card bg-dark border-secondary mx-auto d-none text-start overflow-hidden shadow-lg" style="max-width: 600px;">
                <div class="card-body p-3">
                    <div class="d-flex align-items-center gap-3">
                        <img id="preview-img" src="" class="rounded shadow-sm flex-shrink-0" style="width: 80px; height: 80px; object-fit: cover;">
                        
                        <div class="flex-grow-1" style="min-width: 0;">
                            <h5 id="preview-title" class="text-white mb-1 text-truncate fw-bold">...</h5>
                            <div class="d-flex align-items-center gap-2">
                                <span id="preview-type" class="badge bg-secondary border border-dark">Link</span>
                                <small class="text-muted text-truncate" style="font-size: 0.8em;">Pronto para baixar</small>
                            </div>
                        </div>

                        <div class="flex-shrink-0 ms-2">
                            <button id="download-btn" class="btn btn-apple d-flex align-items-center gap-2 px-4 py-2 text-nowrap">
                                <i class="fas fa-cloud-download-alt"></i> <span>Baixar</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-end mb-4 border-bottom border-secondary pb-2">
            <ul class="nav nav-pills" id="queueTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="active-tab" data-bs-toggle="pill" data-bs-target="#pills-active" type="button">
                        <i class="fas fa-spinner me-2"></i>Baixando <span id="count-active" class="badge bg-dark ms-1">0</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="history-tab" data-bs-toggle="pill" data-bs-target="#pills-history" type="button">
                        <i class="fas fa-history me-2"></i>Histórico <span id="count-history" class="badge bg-dark ms-1">0</span>
                    </button>
                </li>
            </ul>
            <button id="pause-btn" class="btn btn-outline-warning btn-sm rounded-pill px-3">
                <i class="fas fa-pause me-1"></i> Pausar
            </button>
        </div>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-active">
                <div id="queue-grid-active" class="row g-3"></div>
            </div>
            <div class="tab-pane fade" id="pills-history">
                <div id="queue-grid-history" class="row g-3"></div>
            </div>
        </div>
    </div>

    <div id="log-drawer" class="log-drawer fixed-bottom bg-black border-top border-secondary" style="height: 0; transition: 0.3s; overflow: hidden;">
        <div class="container py-3 h-100 d-flex flex-column">
            <div class="d-flex justify-content-between mb-2">
                <h6 class="text-white">System Logs</h6>
                
                <div class="d-flex gap-2">
                    <button id="login-btn" class="btn btn-xs btn-outline-light">Login Wrapper</button>
                    <button id="stop-wrapper-btn" class="btn btn-xs btn-outline-danger d-none">Stop Wrapper</button>
                </div>
            </div>
            
            <div class="row flex-grow-1 overflow-hidden">
                <div class="col-md-6 h-100 d-flex flex-column">
                    <small class="text-muted">Wrapper Output</small>
                    <div id="wrapper-logs" class="log-box flex-grow-1 bg-dark p-2 rounded text-monospace small overflow-auto text-success"></div>
                </div>
                <div class="col-md-6 h-100 d-flex flex-column">
                    <small class="text-muted">Downloader Output</small>
                    <div id="downloader-logs" class="log-box flex-grow-1 bg-dark p-2 rounded text-monospace small overflow-auto text-info"></div>
                </div>
            </div>
            
            <div id="login-form" class="d-none position-absolute top-50 start-50 translate-middle bg-dark p-3 rounded border shadow-lg" style="z-index: 2000;">
                <h5>Wrapper Login</h5>
                <input id="email" class="form-control mb-2" placeholder="Email">
                <input id="password" type="password" class="form-control mb-2" placeholder="Password">
                <button id="submit-login" class="btn btn-primary w-100">Connect</button>
            </div>
        </div>
    </div>

    <div id="selection-area" class="card bg-dark border-warning mt-4 d-none position-fixed bottom-0 start-50 translate-middle-x mb-4 shadow-lg" style="width: 90%; max-width: 600px; z-index: 3000;">
        <div class="card-header bg-warning text-dark fw-bold d-flex justify-content-between">
            <span>Selecione as Faixas</span>
            <button class="btn btn-sm btn-dark" onclick="skipSelection()">Pular</button>
        </div>
        <div class="card-body">
            <div id="selection-list" style="max-height: 250px; overflow-y: auto;"></div>
            <button id="submit-selection" class="btn btn-warning w-100 mt-3 fw-bold">Confirmar</button>
        </div>
    </div>

    <div id="twofa-modal" class="d-none position-fixed top-0 start-0 w-100 h-100 bg-black bg-opacity-75 d-flex align-items-center justify-content-center" style="z-index: 4000;">
        <div class="bg-dark p-4 rounded border text-center">
            <h3>🔐 2FA Code</h3>
            <p>Digite o código enviado ao dispositivo Apple</p>
            <input id="twofa-code" class="form-control text-center fs-3 mb-3" maxlength="6">
            <button id="submit-2fa" class="btn btn-success w-100">Enviar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>function toggleLogs() { 
        const d = document.getElementById('log-drawer'); 
        d.style.height = d.style.height === '350px' ? '0' : '350px'; 
    }</script>
</body>
</html>
